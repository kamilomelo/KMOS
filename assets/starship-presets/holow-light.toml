# === Line break and character ============================
# =========================================================

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[ пҒЎ ](bold fg:green)'
error_symbol = '[ пҒЎ ](bold fg:red)'
vimcmd_symbol = '[ пҒ  ](bold fg:green)'
vimcmd_replace_one_symbol = '[ пҒ  ](bold fg:purple)'
vimcmd_replace_symbol = '[ пҒ  ](bold fg:purple)'
vimcmd_visual_symbol = '[ пҒ  ](bold fg:yellow)'

[cmd_duration]
disabled = false
show_milliseconds = true
show_notifications = true
min_time = 3_000
min_time_to_notify = 60_000
style = 'fg:gray'
format = '[пҒў $duration пҒЎ ]($style)'

# === Custom Modules ======================================
# =========================================================

[custom.cpu_temp]
disabled = false
command = """
sensors | grep 'Core' | awk '
{
  t = $3
  n = t
  gsub(/\\+|В°C/, "", n)

  # Do not show anything if below 60В°C
  if (n < 60) {
    exit
  }

  if (n < 64) {
    icon = "пӢӣ пӢҮ"
    color = "\\033[38;2;207;207;207m"   # texto
  } else if (n < 68) {
    icon = "пӢӣ пӢҮ"
    color = "\\033[38;2;143;188;187m"   # foam
  } else if (n < 72) {
    icon = "пӢӣ пӢҲ"
    color = "\\033[38;2;163;190;140m"   # green
  } else if (n < 76) {
    icon = "пӢӣ пӢү"
    color = "\\033[38;2;235;203;139m"   # yellow
  } else if (n < 80) {
    icon = "пӢӣ пӢҠ"
    color = "\\033[38;2;208;135;112m"   # orange
  } else {
    icon = "пӢӣ пӢӢ"
    color = "\\033[38;2;191;97;106m"    # red
  }

  printf "%s%s %s\\033[39m\\n", color, icon, t
  exit
}
'
"""
when = 'true'
style = 'fg:texto bg:backa'
format = '[($output )]($style)'

# =========================================================
