# kmos Starship preset
# Mode: holow
# Theme: light
'$schema' = 'https://starship.rs/config-schema.json'

# === Format ==============================================
# =========================================================

format = """
[ в–‘в–’в–“в–Ҳ$sudoв–Ҳв–“в–’в–‘ ](backa)\
$username\
${custom.cpu_temp}\
$time\
$os\
[вқҜ ](fg:backa bg:backe)\
$hostname\
$localip\
[вқҜ ](fg:backe bg:backi)\
$shell\
$shlvl\
[вқҜ ](fg:backi bg:backo)\
$git_branch\
$git_status\
$git_commit\
$git_metrics\
$package\
$c\
$cpp\
$golang\
$julia\
$nodejs\
$rust\
$typst\
$python\
$conda\
$docker_context\
$container\
[вқҜ ](fg:backo bg:backu)\
$directory\
$battery\
$env_var\
[вқҜ ](fg:backu)\
$line_break\
$character\
[](fg:texto)\
$cmd_duration
"""

add_newline = false

# === Color palette =======================================
# From https://www.nordtheme.com
# =========================================================

palette = 'km_darkbkg'

[palettes.km_darkbkg]
texti  = '#1e1e1e'
texto  = '#d2d2d2'
backa  = 'none'
backe  = 'none'
backi  = 'none'
backo  = 'none'
backu  = 'none'

black = '#000000'
gray = '#757575'
white = '#ffffff'
red = '#bf616a'
orange = '#d08770'
yellow = '#ebcb8b'
green = '#a3be8c'
purple = '#b48ead'
foam = '#8fbcbb'
teal = '#88c0d0'
steel = '#81a1c1'
blue = '#5e81ac'

# === Modules =============================================
# =========================================================

[username]
disabled = false
show_always = true
style_user = 'fg:texto bg:backa'
style_root = 'fg:texto bg:backa'
format = '[пҶғ ]($style)[$user ]($style)' # оёҚ, пҶғ пҶӮ

[sudo]
disabled = false
symbol = ' оҪҡ '# оҪҡ у°ҢҶ
style = 'fg:black bg:yellow'
format = '[ $symbol ]($style)'

[time]
disabled = false
time_format = '%R'
style = 'fg:texto bg:backa'
format = '[пҖ— $time ]($style)'

[os]
disabled = false
style = 'fg:texto bg:backa'
format = '[$symbol]($style)'

[os.symbols]
Arch = 'у°ЈҮ '
RockyLinux = 'пҢ« '
Debian = 'у°Јҡ '   # Below, suboptimal diestros
Windows = 'оңҸ '
Android = 'оңҺ '
Linux = 'у°ҢҪ ' # Below, what?
Ubuntu = 'пҢҙ '

# =========================================================

[hostname]
disabled = false
ssh_only = true
ssh_symbol =  'ојү ' # other options у°ЈҖ уұҳ–
style = 'fg:texto bg:backe'
format = '[$ssh_symbol ]($style)[$hostname ]($style)'

[localip]
disabled = false
ssh_only = true
style = 'fg:texto bg:backe'
format = '[$localipv4 ]($style)'

# =========================================================

[shell]
disabled = false
bash_indicator = 'п’ү  bash'
zsh_indicator = 'п’ү  zsh'
fish_indicator = 'п’ү  fish'
powershell_indicator = 'п’ү  psh'
unknown_indicator = 'п’ү  shell'
style = 'fg:texto bg:backi'
format = '[$indicator ]($style)'

[shlvl]
disabled = false
threshold = 2
symbol = 'пҒҪ '
style = 'fg:texto bg:backi blink'
format = '[$symbol$shlvl ]($style)'

# =========================================================

[git_branch]
disabled = false
symbol = 'пҗҳ '
style = 'fg:yellow bg:backo'
format = '[$symbol $branch ]($style)'

[git_status]
disabled = false
style = 'fg:yellow bg:backo'
format = '[($all_status $ahead_behind )]($style)'

[git_commit]
disabled = false
tag_disabled = false
only_detached = false
style = 'fg:gray bg:backo'
commit_hash_length = 3
tag_symbol = 'п…І пҖ« '
format = '[\(п…І $hash$tag пҖ«\) ]($style)'

[git_metrics]
disabled = false
only_nonzero_diffs = false
added_style = 'fg:blue bg:backo'
deleted_style = 'fg:red bg:backo'
format = '[+$added:]($added_style)[-$deleted ]($deleted_style)'

# =========================================================

[package]
disabled = false
symbol = 'пҶІ '
style = 'fg:green bg:backo'
format = '[$symbol$version ]($style)'

# =========================================================

[c]
disabled = false
symbol = 'оҳһ '
style = 'fg:steel bg:backo'
format = '[$symbol$version ]($style)'

[cpp]
disabled = false
symbol = 'оҳқ '
style = 'fg:steel bg:backo'
format = '[$symbol$version ]($style)'

[golang]
disabled = false
symbol = 'оҳ§ '
style = 'fg:steel bg:backo'
format = '[$symbol$version ]($style)'

[julia]
disabled = false
symbol = 'о Қ '
style = 'fg:steel bg:backo'
format = '[$symbol$version ]($style)'

[nodejs]
disabled = false
symbol = 'оңҳ '
style = 'fg:steel bg:backo'
format = '[$symbol$version ]($style)'

[rust]
disabled = false
symbol = 'оһЁ '
style = 'fg:steel bg:backo'
format = '[$symbol$version ]($style)'

[typst]
disabled = false
symbol = 'пҚҝ '
style = 'fg:steel bg:backo'
format = '[$symbol$version ]($style)'

[python]
disabled = false
symbol = 'оҳҶ '
style = 'fg:steel bg:backo'
