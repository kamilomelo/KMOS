# =========================================================

[conda]
symbol = 'п„Ң '
style = 'fg:teal bg:backo'
format = '[($symbol$environment )]($style)'
ignore_base = false

# =========================================================

[docker_context]
disabled = false
symbol = 'пҲҹ '
style = 'fg:foam bg:backo'
only_with_files = false
format = '[($symbol $context )]($style)'

[container]
disabled = false
symbol = 'пҲҹ '
style = 'fg:blue bg:backo'
format = '[($symbol $name )]($style)'

# =========================================================

[directory]
disabled = false
truncation_length = 3
truncation_symbol = 'вҖўвҖўвҖў/'
home_symbol = 'пҖ• '
read_only = 'пҖЈ '
read_only_style = 'fg:red bg:backu'
style = 'fg:texto bg:backu'
format = '[($read_only)]($read_only_style)[$path ]($style)'

[directory.substitutions]
'kDrive' = 'KM пҒј '
'KM-RoBoTa-Drive' = 'KM-R пҒј '
'KM-RoBoTa' = 'KM-R пҖ“ '
'accounting and finance' = 'оҫҚ '
'human resources' = 'пғҖ '
'management' = 'пҖ‘ '
'operations' = 'оҪ° '
'research and development' = 'пғғ '
'sales and marketing' = 'пҲҒ '

'Documents' = 'п…ӣ '
'Downloads' = 'пҖҷ '
'Music' = 'пҖҒ '
'Pictures' = 'пҖҫ '
'Repository' = 'п„Ў '

# === Battery status ======================================
# =========================================================

[battery]
disabled = false
full_symbol = 'пүҖ '
charging_symbol = 'пғ§ '
empty_symbol = 'оё• оё• оё• '
format = '[$symbol$percentage ]($style)'

[[battery.display]]
threshold = 81
style = 'fg:green bg:backu'
discharging_symbol = 'пүҖ '

[[battery.display]]
threshold = 72
style = 'fg:yellow bg:backu'
discharging_symbol = 'пүҒ '

[[battery.display]]
threshold = 63
style = 'fg:orange bg:backu'
discharging_symbol = 'пүӮ '

[[battery.display]]
threshold = 54
style = 'fg:orange bg:backu'
discharging_symbol = 'пүғ '

[[battery.display]]
threshold = 45
style = 'fg:red bg:backu'
discharging_symbol = 'пү„ '

[[battery.display]]
threshold = 36
style = 'fg:red bg:backu'
discharging_symbol = 'оё• '

[[battery.display]]
threshold = 27
style = 'fg:red bg:backu'
