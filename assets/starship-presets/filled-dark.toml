# kmos Starship preset
# Mode: filled
# Theme: dark
'$schema' = 'https://starship.rs/config-schema.json'

# === Format ==============================================
# =========================================================

format = """
[ тЦСтЦТтЦУтЦИ](backa)\
$username\
$sudo\
${custom.cpu_temp}\
$time\
$os\
[юВ░](fg:backa bg:backe)\
$hostname\
$localip\
[юВ░](fg:backe bg:backi)\
$shell\
$shlvl\
[юВ░](fg:backi bg:backo)\
$git_branch\
$git_status\
$git_commit\
$git_metrics\
$package\
$c\
$cpp\
$golang\
$julia\
$nodejs\
$rust\
$typst\
$python\
$conda\
$docker_context\
$container\
[юВ░](fg:backo bg:backu)\
$directory\
$battery\
$env_var\
[юВ░](fg:backu)\
$line_break\
$character\
[](fg:texto)\
$cmd_duration
"""

add_newline = false

# === Color palette =======================================
# From https://www.nordtheme.com
# =========================================================

palette = 'km_darkbkg'

[palettes.km_darkbkg]
texti  = '#1e1e1e'
texto  = '#d2d2d2'
backu  = '#242933'
backo  = '#2e3440'
backi  = '#3b4252'
backe  = '#434c5e'
backa  = '#4c566a'

black = '#000000'
gray = '#757575'
white = '#ffffff'
red = '#bf616a'
orange = '#d08770'
yellow = '#ebcb8b'
green = '#a3be8c'
purple = '#b48ead'
foam = '#8fbcbb'
teal = '#88c0d0'
steel = '#81a1c1'
blue = '#5e81ac'

# === Modules =============================================
# =========================================================

[username]
disabled = false
show_always = true
style_user = 'fg:texto bg:backa'
style_root = 'fg:texto bg:backa'
format = '[яЖГ ]($style)[$user ]($style)' # ю╕Н, яЖГ яЖВ

[sudo]
disabled = false
symbol = ' ю╜Ъ '# ю╜Ъ ґ░МЖ
style = 'fg:black bg:yellow'
format = '[ $symbol ]($style)'

[time]
disabled = false
time_format = '%R'
style = 'fg:texto bg:backa'
format = '[ яАЧ $time ]($style)'

[os]
disabled = false
style = 'fg:texto bg:backa'
format = '[$symbol]($style)'

[os.symbols]
Arch = 'ґ░гЗ '
RockyLinux = 'яМл '
Debian = 'ґ░гЪ '   # Below, suboptimal diestros
Windows = 'юЬП '
Android = 'юЬО '
Linux = 'ґ░М╜ ' # Below, what?
Ubuntu = 'яМ┤ '

# =========================================================

[hostname]
disabled = false
ssh_only = true
ssh_symbol =  'ю╝Й ' # other options ґ░гА ґ▒ШЦ
style = 'fg:texto bg:backe'
format = '[ $ssh_symbol ]($style)[$hostname ]($style)'

[localip]
disabled = false
ssh_only = true
style = 'fg:texto bg:backe'
format = '[$localipv4 ]($style)'

# =========================================================

[shell]
disabled = false
bash_indicator = 'яТЙ  bash'
zsh_indicator = 'яТЙ  zsh'
fish_indicator = 'яТЙ  fish'
powershell_indicator = 'яТЙ  psh'
unknown_indicator = 'яТЙ  shell'
style = 'fg:texto bg:backi'
format = '[$indicator ]($style)'

[shlvl]
disabled = false
threshold = 2
symbol = 'яБ╜ '
style = 'fg:texto bg:backi blink'
format = '[$symbol$shlvl ]($style)'

# =========================================================

[git_branch]
disabled = false
symbol = 'яРШ '
style = 'fg:yellow bg:backo'
format = '[$symbol $branch ]($style)'

[git_status]
disabled = false
style = 'fg:yellow bg:backo'
format = '[($all_status $ahead_behind )]($style)'

[git_commit]
disabled = false
tag_disabled = false
only_detached = false
style = 'fg:gray bg:backo'
commit_hash_length = 3
tag_symbol = 'яЕ▓ яАл '
format = '[\(яЕ▓ $hash$tag яАл\) ]($style)'

[git_metrics]
disabled = false
only_nonzero_diffs = false
added_style = 'fg:blue bg:backo'
deleted_style = 'fg:red bg:backo'
format = '[+$added:]($added_style)[-$deleted ]($deleted_style)'

# =========================================================

[package]
disabled = false
symbol = 'яЖ▓ '
style = 'fg:green bg:backo'
format = '[$symbol$version ]($style)'

# =========================================================

[c]
disabled = false
symbol = 'юШЮ '
style = 'fg:steel bg:backo'
format = '[$symbol$version ]($style)'

[cpp]
disabled = false
symbol = 'юШЭ '
style = 'fg:steel bg:backo'
format = '[$symbol$version ]($style)'

[golang]
disabled = false
symbol = 'юШз '
style = 'fg:steel bg:backo'
format = '[$symbol$version ]($style)'

[julia]
disabled = false
symbol = 'юаН '
style = 'fg:steel bg:backo'
format = '[$symbol$version ]($style)'

[nodejs]
disabled = false
symbol = 'юЬШ '
style = 'fg:steel bg:backo'
format = '[$symbol$version ]($style)'

[rust]
disabled = false
symbol = 'юЮи '
style = 'fg:steel bg:backo'
format = '[$symbol$version ]($style)'

[typst]
disabled = false
symbol = 'яН┐ '
style = 'fg:steel bg:backo'
format = '[$symbol$version ]($style)'

[python]
disabled = false
symbol = 'юШЖ '
style = 'fg:steel bg:backo'
format = '[$symbol$version (\(#$virtualenv\) )]($style)'

# =========================================================

[conda]
symbol = 'яДМ '
style = 'fg:teal bg:backo'
format = '[($symbol$environment )]($style)'
ignore_base = false

# =========================================================

[docker_context]
disabled = false
symbol = 'яИЯ '
style = 'fg:foam bg:backo'
only_with_files = false
format = '[($symbol $context )]($style)'

[container]
disabled = false
symbol = 'яИЯ '
style = 'fg:blue bg:backo'
format = '[($symbol $name )]($style)'

# =========================================================

[directory]
disabled = false
truncation_length = 3
truncation_symbol = 'тАвтАвтАв/'
home_symbol = 'яАХ '
read_only = 'яАг '
read_only_style = 'fg:red bg:backu'
style = 'fg:texto bg:backu'
format = '[($read_only)]($read_only_style)[$path ]($style)'

[directory.substitutions]
'kDrive' = 'KM яБ╝ '
'KM-RoBoTa-Drive' = 'KM-R яБ╝ '
'KM-RoBoTa' = 'KM-R яАУ '
'accounting and finance' = 'ю╛Н '
'human resources' = 'яГА '
'management' = 'яАС '
'operations' = 'ю╜░ '
'research and development' = 'яГГ '
'sales and marketing' = 'яИБ '

'Documents' = 'яЕЫ '
'Downloads' = 'яАЩ '
'Music' = 'яАБ '
'Pictures' = 'яА╛ '
'Repository' = 'яДб '

# === Battery status ======================================
# =========================================================

[battery]
disabled = false
full_symbol = 'яЙА '
charging_symbol = 'яГз '
empty_symbol = 'ю╕Х ю╕Х ю╕Х '
format = '[$symbol$percentage ]($style)'

[[battery.display]]
threshold = 81
style = 'fg:green bg:backu'
discharging_symbol = 'яЙА '

[[battery.display]]
threshold = 72
style = 'fg:yellow bg:backu'
discharging_symbol = 'яЙБ '

[[battery.display]]
threshold = 63
style = 'fg:orange bg:backu'
discharging_symbol = 'яЙВ '

[[battery.display]]
threshold = 54
style = 'fg:orange bg:backu'
discharging_symbol = 'яЙГ '

[[battery.display]]
threshold = 45
style = 'fg:red bg:backu'
discharging_symbol = 'яЙД '

[[battery.display]]
threshold = 36
style = 'fg:red bg:backu'
discharging_symbol = 'ю╕Х '

[[battery.display]]
threshold = 27
style = 'fg:red bg:backu'
discharging_symbol = 'ю╕Х ю╕Х '

# === Line break and character ============================
# =========================================================

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[ яБб ](bold fg:green)'
error_symbol = '[ яБб ](bold fg:red)'
vimcmd_symbol = '[ яБа ](bold fg:green)'
vimcmd_replace_one_symbol = '[ яБа ](bold fg:purple)'
vimcmd_replace_symbol = '[ яБа ](bold fg:purple)'
vimcmd_visual_symbol = '[ яБа ](bold fg:yellow)'

[cmd_duration]
disabled = false
show_milliseconds = true
show_notifications = true
min_time = 3_000
min_time_to_notify = 60_000
style = 'fg:gray'
format = '[яБв $duration яБб ]($style)'

# === Custom Modules ======================================
# =========================================================

[custom.cpu_temp]
disabled = false
command = """
sensors | grep 'Core' | awk '
{
  t = $3
  n = t
  gsub(/\\+|┬░C/, "", n)

  # Do not show anything if below 60┬░C
  if (n < 60) {
    exit
  }

  if (n < 64) {
    icon = "яЛЫ яЛЗ"
    color = "\\033[38;2;207;207;207m"   # texto
  } else if (n < 68) {
    icon = "яЛЫ яЛЗ"
    color = "\\033[38;2;143;188;187m"   # foam
  } else if (n < 72) {
    icon = "яЛЫ яЛИ"
    color = "\\033[38;2;163;190;140m"   # green
  } else if (n < 76) {
    icon = "яЛЫ яЛЙ"
    color = "\\033[38;2;235;203;139m"   # yellow
  } else if (n < 80) {
    icon = "яЛЫ яЛК"
    color = "\\033[38;2;208;135;112m"   # orange
  } else {
    icon = "яЛЫ яЛЛ"
    color = "\\033[38;2;191;97;106m"    # red
  }

  printf "%s%s %s\\033[39m\\n", color, icon, t
  exit
}
'
"""
when = 'true'
style = 'bg:backa'
format = '[( $output)]($style)'

# =========================================================
