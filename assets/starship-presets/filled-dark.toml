'$schema' = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

add_newline = false
palette = 'filled_dark'

[palettes.filled_dark]
bg0 = '#2e3440'
bg1 = '#3b4252'
fg0 = '#eceff4'
fg1 = '#d8dee9'
blue = '#81a1c1'
green = '#a3be8c'
yellow = '#ebcb8b'
red = '#bf616a'

[username]
show_always = true
style_user = 'fg:fg0 bg:bg0'
style_root = 'fg:red bg:bg0 bold'
format = '[ $user ]($style)'

[hostname]
ssh_only = false
style = 'fg:fg1 bg:bg1'
format = '[ $hostname ]($style)'

[directory]
style = 'fg:bg0 bg:blue bold'
format = '[ $path ]($style)'
truncation_length = 3
truncate_to_repo = false

[git_branch]
style = 'fg:bg0 bg:green bold'
format = '[ $branch ]($style)'

[git_status]
style = 'fg:bg0 bg:yellow'
format = '[ $all_status$ahead_behind ]($style)'

[cmd_duration]
min_time = 1000
style = 'fg:yellow'
format = '[ $duration ]($style)'

[character]
success_symbol = '[>](bold green)'
error_symbol = '[>](bold red)'
